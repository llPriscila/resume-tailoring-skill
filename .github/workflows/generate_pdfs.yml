name: Generate CV PDFs

on:
  push:
    branches: [master]
    paths:
      - 'output/**_Resume.md'
      - 'output/resume.css'
      - '.github/workflows/generate_pdfs.yml'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc and WeasyPrint
        run: |
          sudo apt-get update -q
          sudo apt-get install -y pandoc python3-pip python3-venv libpango-1.0-0 libpangoft2-1.0-0
          pip3 install weasyprint

      - name: Convert CV markdown files to PDF
        run: |
          cd output
          for md in *_Resume.md; do
            [[ "$md" == *_Report* ]] && continue
            echo "Converting: $md"
            pandoc "$md" \
              --pdf-engine=weasyprint \
              --css resume.css \
              -o "${md%.md}.pdf"
            echo "  → ${md%.md}.pdf"
          done

      - name: Upload PDFs as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdfs
          path: output/*.pdf
          retention-days: 30

      - name: Commit PDFs back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes to commit."
          else
            git commit -m "chore: regenerate CV PDFs [skip ci]"
            git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
